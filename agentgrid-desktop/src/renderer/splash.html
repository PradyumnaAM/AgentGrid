<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' ws://localhost:5173 http://localhost:5173"
    />
    <title>AgentGrid Loading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./tokens.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
        color: #F8FAFC;
        font-family: "Inter", system-ui, sans-serif;
        user-select: none;
      }

      .splash-card {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 36px 36px;
        border-radius: 12px;
        background:
          radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255, 210, 63, 0.07) 0%, transparent 60%),
          linear-gradient(160deg, rgba(20, 16, 6, 0.98) 0%, rgba(8, 10, 13, 1) 100%);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
        -webkit-app-region: drag;
      }

      /* Gold top-edge accent line */
      .splash-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 210, 63, 0.6), transparent);
        border-radius: 1px;
      }

      .splash-logo-wrap {
        position: relative;
        width: 88px;
        height: 88px;
        display: grid;
        place-items: center;
        margin-bottom: 24px;
      }

      /* Animated gold glow rings */
      .splash-logo-wrap::before {
        content: '';
        position: absolute;
        inset: -12px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 210, 63, 0.18) 0%, transparent 70%);
        animation: goldPulse 2s ease-in-out infinite alternate;
      }

      .splash-logo-wrap::after {
        content: '';
        position: absolute;
        inset: -4px;
        border-radius: 22px;
        border: 1px solid rgba(255, 210, 63, 0.22);
        animation: goldRing 2s ease-in-out infinite alternate;
        animation-delay: 0.4s;
      }

      .splash-logo {
        position: relative;
        z-index: 1;
        width: 72px;
        height: 72px;
        object-fit: contain;
        filter: drop-shadow(0 0 16px rgba(255, 210, 63, 0.32));
        -webkit-user-drag: none;
      }

      .splash-name {
        margin: 0 0 4px;
        font-family: "Inter", system-ui, sans-serif;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.3px;
        line-height: 1.1;
        background: linear-gradient(135deg, #FFE57A 0%, #FFC107 55%, #F59E0B 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .splash-tagline {
        margin: 0 0 20px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 400;
        color: rgba(255, 210, 63, 0.5);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .splash-divider {
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
        margin-bottom: 18px;
      }

      .splash-loading {
        margin: 0;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 400;
        color: #6B7280;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* Animated gold progress bar */
      .splash-bar-track {
        width: 100%;
        height: 2px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.05);
        margin-top: 16px;
        overflow: hidden;
      }

      .splash-bar-fill {
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, #F59E0B, #FFD23F, #FFC107);
        animation: barSweep 2.4s ease-in-out infinite;
        transform-origin: left;
      }

      .splash-dots {
        display: inline-block;
        width: 1.6em;
        text-align: left;
      }

      .splash-dots::after {
        content: '';
        animation: loadingDots 1.1s steps(4, end) infinite;
      }

      @keyframes loadingDots {
        0%   { content: ''; }
        25%  { content: '.'; }
        50%  { content: '..'; }
        75%  { content: '...'; }
        100% { content: '...'; }
      }

      @keyframes goldPulse {
        from { opacity: 0.5; transform: scale(0.94); }
        to   { opacity: 1;   transform: scale(1.06); }
      }

      @keyframes goldRing {
        from { opacity: 0.3; transform: scale(0.96); }
        to   { opacity: 0.7; transform: scale(1.04); }
      }

      @keyframes barSweep {
        0%   { transform: scaleX(0);   margin-left: 0; }
        45%  { transform: scaleX(0.7); margin-left: 0; }
        55%  { transform: scaleX(0.7); margin-left: 30%; }
        100% { transform: scaleX(0);   margin-left: 100%; }
      }

      @media (prefers-reduced-motion: reduce) {
        .splash-logo-wrap::before,
        .splash-logo-wrap::after,
        .splash-bar-fill {
          animation: none;
          opacity: 0.6;
        }
        .splash-dots::after {
          animation: none;
          content: '...';
        }
      }
    </style>
  </head>
  <body>
    <main class="splash-card" aria-label="AgentGrid is loading">
      <div class="splash-logo-wrap" aria-hidden="true">
        <img class="splash-logo" src="./logo.png" alt="" draggable="false" />
      </div>
      <h1 class="splash-name">AgentGrid</h1>
      <p class="splash-tagline">Terminal Workspace</p>
      <div class="splash-divider" aria-hidden="true"></div>
      <p class="splash-loading">
        Initializing<span class="splash-dots" aria-hidden="true"></span>
      </p>
      <div class="splash-bar-track" aria-hidden="true">
        <div class="splash-bar-fill"></div>
      </div>
    </main>
  </body>
</html>
